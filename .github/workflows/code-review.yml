name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini AI Review
        # 통신에 성공했던 원래 액션 사용
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # 핵심: 무료 티어용 최신 모델 지정
          model: "gemini-2.5-flash"
          prompt: "Please review the code changes and provide feedback in Korean."