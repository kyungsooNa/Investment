name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # 🔐 README 수정 및 Pages 배포를 위해 모든 쓰기 권한을 활성화합니다.
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_PAT }}  # <--- 이 줄을 추가합니다!
        
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10" #
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Mock Config and Data
      run: |
        mkdir -p config data
        cp config/config.yaml.example config/config.yaml || echo "No example config"
        # CI 테스트 통과를 위한 web 설정 강제 추가 (AppConfig 유효성 검사 대응)
        echo "" >> config/config.yaml
        echo "web:" >> config/config.yaml
        echo "  host: \"127.0.0.1\"" >> config/config.yaml
        echo "  port: 8000" >> config/config.yaml
        echo "  reload: false" >> config/config.yaml

    - name: Run tests with coverage
      run: |
        # XML(뱃지용)과 HTML(웹배포용) 리포트를 모두 생성합니다.
        pytest tests --cov=. --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-report=term-missing > coverage.txt

    # 🚀 1. README 뱃지 강제 업데이트 (파이썬 사용)
    - name: Force Update README Badge
      if: github.ref == 'refs/heads/main'
      run: |
        python3 -c "
        import xml.etree.ElementTree as ET
        import re

        # 1. 커버리지 수치 가져오기
        try:
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            percent = int(float(root.attrib['line-rate']) * 100)
            color = 'green' if percent >= 90 else 'yellow' if percent >= 70 else 'red'
            badge = f'![Coverage](https://img.shields.io/badge/Coverage-{percent}%25-{color})'

            # 2. README 읽기
            with open('README.md', 'r', encoding='utf-8') as f:
                content = f.read()

            # 3. 본문 보존형 교체 로직
            start_tag = '<!-- Pytest Coverage Comment:Begin -->'
            end_tag = '<!-- Pytest Coverage Comment:End -->'

            if start_tag in content and end_tag in content:
                # 표지판 사이의 내용만 타겟팅하는 정규표현식
                pattern = re.escape(start_tag) + r'.*?' + re.escape(end_tag)
                new_segment = f'{start_tag}\n{badge}\n{end_tag}'
                
                # 파일 전체(content)에서 해당 패턴만 딱 한 번(count=1) 교체
                new_content = re.sub(pattern, new_segment, content, count=1, flags=re.DOTALL)

                # [중요] 만약 결과가 비어있지 않을 때만 파일 쓰기
                if new_content.strip():
                    with open('README.md', 'w', encoding='utf-8') as f:
                        f.write(new_content)
                    print(f'성공: {percent}% 수치로 업데이트 완료!')
            else:
                print('경고: README에서 표지판을 찾지 못해 수정을 취소합니다.')
        except Exception as e:
            print(f'에러 발생: {e}')
        "
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add README.md
        git commit -m "chore: safe update badge [skip ci]" || echo "No changes"
        git push

    # 🚀 2. GitHub Pages 상세 리포트 배포 (유지)
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: htmlcov/

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4