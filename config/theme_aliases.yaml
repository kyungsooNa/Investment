# 테마명 정규화 별칭(alias) 사전.
#
# 네이버 등 소스의 raw 테마명을 표준 normalized_name 으로 매핑한다.
# StockClassificationRepository.get_groups 는 normalized_name 기준으로 소스를
# union 하므로, 같은 개념의 테마가 소스마다 다른 이름으로 들어와도 이 사전으로
# 하나의 그룹으로 합쳐진다.
#
# 형식:  <표준명>: [<원본 테마명1>, <원본 테마명2>, ...]
# 비어 있으면 정규화 없이 raw 테마명이 그대로 사용된다.
aliases:
  로봇/피지컬AI:
    - 로봇(산업용/협동로봇 등)
    - 로봇
    - 피지컬 AI/휴머노이드 로봇
    - 휴머노이드 로봇
    - 피지컬AI
    - 피지컬 AI
  SOFC/ESS:
    - 고체산화물 연료전지(SOFC)
    - SOFC
    - 전력저장장치(ESS)
    - ESS
