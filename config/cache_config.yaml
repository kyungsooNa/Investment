cache:
  default_ttl: 300
  file_cache_enabled:   1
  memory_cache_enabled: 1
  use_db_cache: 1
  enabled_methods: # 실시간성 필요 없는 함수 list
    # NOTE: get_current_price는 MarketDataService 내부의 3초 단기 캐시 +
    # 장 마감 후 DB 스냅샷 폴백이 이미 캐싱을 담당하므로 전역 캐시에서 제외한다.
    # ClientWithCache의 after-hours 캐시는 다음 거래일 개장까지 유지되어
    # 주문/손절/리스크 경로의 신선도 요구(force_fresh=True)와 충돌한다.
    - get_stock_info_by_code
    - get_top_market_cap_stocks_code
    - get_price_summary
    - get_market_cap
    - get_filtered_stocks_by_momentum
    - inquire_daily_itemchartprice
    - inquire_time_itemchartprice
    - inquire_time_dailychartprice
    - get_top_rise_fall_stocks
    - get_top_volume_stocks
    - get_top_trading_value_stocks
    - get_top_foreign_buying_stocks
    - get_investor_trade_by_stock_daily
    - get_program_trade_by_stock_daily
    - get_stock_news
    - get_etf_info

  deserializable_classes:
    - common.types.ResCommonResponse
    - common.types.ResStockFullInfoApiOutput
    - common.types.ResFluctuation
    - common.types.ResPriceSummary
    - common.types.ResDailyChartApiItem