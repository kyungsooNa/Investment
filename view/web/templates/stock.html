{% extends "base.html" %}

{% block head_scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial/dist/chartjs-chart-financial.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
{% endblock %}

{% block content %}
    <div id="section-stock" class="section">
        <div class="card">
            <h2>종목 현재가 조회</h2>
            <div class="form-row" style="position: relative;">
                <label>종목코드/종목명</label>
                <input type="text" id="stock-code-input" placeholder="예: 005930 / 삼성전자 / ㅅㅅㅈㅈ / 삼성ㅈㅈ" autocomplete="off">
                <button class="btn" onclick="searchStock()">조회</button>
                <ul id="stock-autocomplete-list" class="autocomplete-list"></ul>
            </div>
        </div>
        <div id="stock-result"></div>
        <div class="card" id="stock-chart-card" style="display: none; margin-top: 16px;">
            <div id="chart-controls-area" style="text-align: right; margin-bottom: 10px; min-height: 24px;"></div>
            <div style="position: relative; height: 650px; width: 100%;">
                <canvas id="stockChart"></canvas>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script src="/static/js/candle_chart.js?v=2"></script>
<script>
    // 종목 리스트: localStorage에서 즉시 복원, 없으면 API 로드 후 저장
    var ALL_STOCKS = (function() {
        try {
            var cached = localStorage.getItem('all_stocks_v2');
            if (cached) return JSON.parse(cached);
        } catch(e) {}
        return null;
    })();

    if (!ALL_STOCKS) {
        fetch('/api/stocks/list')
            .then(function(r) { return r.json(); })
            .then(function(json) {
                ALL_STOCKS = json.stocks || [];
                try { localStorage.setItem('all_stocks_v2', JSON.stringify(ALL_STOCKS)); } catch(e) {}
                document.dispatchEvent(new CustomEvent('all-stocks-ready', { detail: ALL_STOCKS }));
            })
            .catch(function() { ALL_STOCKS = []; });
    }
</script>
<script src="/static/js/autocomplete.js?v=1"></script>
<script src="/static/js/stock.js?v=7"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (code) {
            const input = document.getElementById('stock-code-input');
            if (input) input.value = code;
            searchStock(code);
        }
    });
</script>
{% endblock %}
