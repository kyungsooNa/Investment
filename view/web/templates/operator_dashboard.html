{% extends "base.html" %}

{% block content %}
<div class="section">
    <h2 style="margin-bottom: 20px;">🛡️ 운영자 대시보드</h2>

    <!-- 서브시스템 상태 카드 -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px;">
        <div class="card" style="padding:16px;text-align:center;" id="card-kill-switch">
            <div style="font-size:1.4rem;">🔴</div>
            <div style="font-weight:600;margin-top:4px;">Kill Switch</div>
            <div id="ks-badge" style="margin-top:6px;font-size:0.85rem;color:#888;">조회 중…</div>
        </div>
        <div class="card" style="padding:16px;text-align:center;" id="card-risk-gate">
            <div style="font-size:1.4rem;">🚧</div>
            <div style="font-weight:600;margin-top:4px;">Risk Gate</div>
            <div id="rg-badge" style="margin-top:6px;font-size:0.85rem;color:#888;">조회 중…</div>
        </div>
        <div class="card" style="padding:16px;text-align:center;" id="card-reconcile">
            <div style="font-size:1.4rem;">🔄</div>
            <div style="font-weight:600;margin-top:4px;">Reconcile</div>
            <div id="rc-badge" style="margin-top:6px;font-size:0.85rem;color:#888;">조회 중…</div>
        </div>
        <div class="card" style="padding:16px;text-align:center;" id="card-ws-watchdog">
            <div style="font-size:1.4rem;">📡</div>
            <div style="font-weight:600;margin-top:4px;">WebSocket WD</div>
            <div id="wd-badge" style="margin-top:6px;font-size:0.85rem;color:#888;">조회 중…</div>
        </div>
        <div class="card" style="padding:16px;text-align:center;opacity:0.4;">
            <div style="font-size:1.4rem;">📊</div>
            <div style="font-weight:600;margin-top:4px;">Data Quality</div>
            <div style="margin-top:6px;font-size:0.85rem;color:#888;">준비 중</div>
        </div>
    </div>

    <!-- Active 차단 목록 -->
    <div class="card" style="padding:20px 12px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <h3 style="margin:0;">🚨 현재 차단 목록</h3>
            <span id="active-count-badge" style="background:#e53935;color:#fff;border-radius:12px;padding:2px 10px;font-size:0.85rem;">0</span>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>소스</th>
                        <th>차단 키</th>
                        <th>심각도</th>
                        <th>제목</th>
                        <th>메시지</th>
                        <th>최초 발생</th>
                        <th>마지막 발생</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody id="active-alerts-body">
                    <tr><td colspan="8" style="text-align:center;color:#888;">차단 없음</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 전이 이력 -->
    <div class="card" style="padding:20px 12px;">
        <h3 style="margin-top:0;margin-bottom:12px;">📋 최근 전이 이력</h3>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>시각</th>
                        <th>전이</th>
                        <th>소스</th>
                        <th>차단 키</th>
                        <th>심각도</th>
                        <th>제목</th>
                        <th>메시지</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <tr><td colspan="7" style="text-align:center;color:#888;">로딩 중…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<style>
.badge-ok    { background:#43a047; color:#fff; border-radius:8px; padding:2px 8px; }
.badge-warn  { background:#fb8c00; color:#fff; border-radius:8px; padding:2px 8px; }
.badge-crit  { background:#e53935; color:#fff; border-radius:8px; padding:2px 8px; }
.badge-block { background:#7b1fa2; color:#fff; border-radius:8px; padding:2px 8px; }
.transition-new       { color:#e53935; font-weight:700; }
.transition-escalated { color:#fb8c00; font-weight:700; }
.transition-resolved  { color:#43a047; font-weight:700; }
</style>

<script src="/static/js/operator_dashboard.js"></script>
{% endblock %}
