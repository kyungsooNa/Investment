{% extends "base.html" %}

{% block content %}
    <div id="section-ranking" class="section">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h2 style="margin: 0;">상위 종목 랭킹</h2>
                <div class="form-row" style="margin: 0; gap: 4px;">
                    <button class="btn market-filter active" data-market="ALL" onclick="setMarketFilter('ALL', this)">통합</button>
                    <button class="btn market-filter" data-market="KRX" onclick="setMarketFilter('KRX', this)">KRX</button>
                    <button class="btn market-filter" data-market="NXT" onclick="setMarketFilter('NXT', this)" disabled title="준비 중">NXT</button>
                </div>
            </div>
            <div class="form-row">
                <button class="btn ranking-tab active" data-cat="rise" onclick="loadRanking('rise')">상승률</button>
                <button class="btn ranking-tab" data-cat="fall" onclick="loadRanking('fall')">하락률</button>
                <button class="btn ranking-tab" data-cat="volume" onclick="loadRanking('volume')">거래량</button>
                <button class="btn ranking-tab" data-cat="trading_value" onclick="loadRanking('trading_value')">거래대금</button>
                <button class="btn ranking-tab" data-cat="minervini_stage2" onclick="loadRanking('minervini_stage2')">Minervini S2</button>
                <button class="btn ranking-tab" data-cat="newhigh" onclick="loadRanking('newhigh')">신고가</button>
                <button class="btn ranking-tab" data-cat="theme_leaders" onclick="loadThemeLeaders()">지금 테마</button>
                <button class="btn ranking-tab" data-cat="investor_period" onclick="loadPeriodInvestorRanking()">기간수급</button>
            </div>
            <div class="form-row" style="margin-top: 6px;">
                <button class="btn ranking-tab" data-cat="ytd" onclick="loadRanking('ytd')">YTD 상승률</button>
                <div id="ytd-market-row" style="display: none; margin-left: 8px; padding-left: 12px; border-left: 2px solid var(--accent-secondary, #3b82f6);">
                    <button class="btn ytd-market-toggle active" data-ytd-market="ALL" onclick="setYtdMarketFilter('ALL')">전체</button>
                    <button class="btn ytd-market-toggle" data-ytd-market="KOSPI" onclick="setYtdMarketFilter('KOSPI')">코스피</button>
                    <button class="btn ytd-market-toggle" data-ytd-market="KOSDAQ" onclick="setYtdMarketFilter('KOSDAQ')">코스닥</button>
                </div>
            </div>
            <div class="ranking-investor-group" style="margin-top: 6px;">
                <div class="form-row" style="margin-bottom: 0;">
                    <button class="btn ranking-tab" data-cat="net_buy" onclick="setRankingDirection('buy')">순매수</button>
                    <button class="btn ranking-tab" data-cat="net_sell" onclick="setRankingDirection('sell')">순매도</button>
                    <div id="investor-type-row" style="display: none; margin-left: 8px; padding-left: 12px; border-left: 2px solid var(--accent-secondary, #3b82f6);">
                        <button class="btn investor-toggle active" data-inv="foreign" onclick="toggleRankingInvestor('foreign')">외인</button>
                        <button class="btn investor-toggle" data-inv="inst" onclick="toggleRankingInvestor('inst')">기관</button>
                        <button class="btn investor-toggle" data-inv="prsn" onclick="toggleRankingInvestor('prsn')">개인</button>
                        <button class="btn investor-toggle" data-inv="program" onclick="toggleRankingInvestor('program')">프로그램</button>
                    </div>
                </div>
                <div id="period-investor-row" class="form-row" style="display: none; margin-top: 6px; margin-bottom: 0;">
                    <button class="btn period-days active" data-days="5" onclick="setPeriodInvestorDays(5, this)">5D</button>
                    <button class="btn period-days" data-days="1" onclick="setPeriodInvestorDays(1, this)">1D</button>
                    <button class="btn period-days" data-days="3" onclick="setPeriodInvestorDays(3, this)">3D</button>
                    <button class="btn period-days" data-days="10" onclick="setPeriodInvestorDays(10, this)">10D</button>
                    <button class="btn period-days" data-days="20" onclick="setPeriodInvestorDays(20, this)">20D</button>
                    <div style="margin-left: 8px; padding-left: 12px; border-left: 2px solid var(--accent-secondary, #3b82f6);">
                        <button class="btn period-metric active" data-metric="amount" onclick="setPeriodInvestorMetric('amount', this)">금액</button>
                        <button class="btn period-metric" data-metric="qty" onclick="setPeriodInvestorMetric('qty', this)">수량</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="ranking-result"></div>
        <div id="ranking-pagination" class="pagination-wrap"></div>
    </div>
{% endblock %}

{% block scripts %}
<script src="/static/js/ranking.js?v=8"></script>
<script>
    loadRanking('rise');
</script>
{% endblock %}
