{% extends "base.html" %}

{% block content %}
    <div id="section-ranking" class="section">
        <div class="card">
            <h2>상위 종목 랭킹</h2>
            <div class="form-row">
                <button class="btn ranking-tab active" data-cat="rise" onclick="loadRanking('rise')">상승률</button>
                <button class="btn ranking-tab" data-cat="fall" onclick="loadRanking('fall')">하락률</button>
                <button class="btn ranking-tab" data-cat="volume" onclick="loadRanking('volume')">거래량</button>
                <button class="btn ranking-tab" data-cat="trading_value" onclick="loadRanking('trading_value')">거래대금</button>
            </div>
            <div class="form-row" style="margin-top: 6px;">
                <button class="btn ranking-tab" data-cat="foreign_buy" onclick="loadRanking('foreign_buy')">외인 순매수</button>
                <button class="btn ranking-tab" data-cat="foreign_sell" onclick="loadRanking('foreign_sell')">외인 순매도</button>
                <button class="btn ranking-tab" data-cat="inst_buy" onclick="loadRanking('inst_buy')">기관 순매수</button>
                <button class="btn ranking-tab" data-cat="inst_sell" onclick="loadRanking('inst_sell')">기관 순매도</button>
                <button class="btn ranking-tab" data-cat="prsn_buy" onclick="loadRanking('prsn_buy')">개인 순매수</button>
                <button class="btn ranking-tab" data-cat="prsn_sell" onclick="loadRanking('prsn_sell')">개인 순매도</button>
            </div>
            <div class="form-row" style="margin-top: 6px;">
                <button class="btn market-filter active" data-market="KRX" onclick="setMarketFilter('KRX', this)">KRX</button>
                <button class="btn market-filter" data-market="NXT" onclick="setMarketFilter('NXT', this)" disabled title="준비 중">NXT</button>
            </div>
        </div>
        <div id="ranking-result"></div>
    </div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadRanking('rise');
    });
</script>
{% endblock %}
