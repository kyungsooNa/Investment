<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment - Web View</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css?v=8">
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { display: inline-block; animation: spin 1s linear infinite; opacity: 1 !important; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--bg-secondary); color: var(--text-primary); padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 250px; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; animation: toast-in 0.3s ease-out forwards; }
        .toast.success { border-left: 4px solid #51cf66; }
        .toast.error { border-left: 4px solid #ff6b6b; }
        @keyframes toast-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.fade-out { opacity: 0; transform: translateX(100%); transition: all 0.3s ease-in; }
        
        /* 페이지 분리 후 섹션 표시 강제 */
        .section { display: block !important; }

        /* 페이지 전환 로딩 오버레이 */
        .page-loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 12px;
        }
        .page-loading-overlay.active { display: flex; }
        .page-loading-spinner {
            width: 36px; height: 36px;
            border: 3.5px solid rgba(255,255,255,0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .page-loading-text {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
    {% block head_scripts %}
    <!-- 차트 라이브러리는 필요한 페이지에서만 로드 -->
    {% endblock %}
</head>
<body>

<header class="header">
    <h1>Investment</h1>
    <div class="status-bar">
        <span id="status-time">--</span>
        <span id="status-market" class="badge closed">--</span>
        <span id="status-env" class="badge paper clickable" onclick="toggleEnvironment()" title="클릭하여 환경 전환">--</span>
        <div class="notification-wrapper">
            <button class="notification-bell" onclick="toggleNotificationPanel()" title="알림">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span id="notification-badge" class="notification-badge" style="display:none;">0</span>
            </button>
        </div>
    </div>
</header>

<nav class="nav">
    <!-- Flask에서 active_page 변수를 넘겨주어 활성화 클래스 적용 -->
    <a href="/" class="{% if active_page == 'home' %}active{% endif %}">홈</a>
    <a href="/stock" class="{% if active_page == 'stock' %}active{% endif %}">현재가 조회</a>
    <a href="/balance" class="{% if active_page == 'balance' %}active{% endif %}">계좌 잔고</a>
    <a href="/order" class="{% if active_page == 'order' %}active{% endif %}">매수/매도</a>
    <a href="/ranking" class="{% if active_page == 'ranking' %}active{% endif %}">랭킹</a>
    <a href="/marketcap" class="{% if active_page == 'marketcap' %}active{% endif %}">시가총액</a>
    <a href="/virtual" class="{% if active_page == 'virtual' %}active{% endif %}">모의투자 기록</a>
    <a href="/scheduler" class="{% if active_page == 'scheduler' %}active{% endif %}">전략 스케줄러</a>
    <a href="/program" class="{% if active_page == 'program' %}active{% endif %}">프로그램매매</a>
</nav>

<main class="main">
    {% block content %}
    <!-- 각 페이지의 콘텐츠가 여기에 들어갑니다 -->
    {% endblock %}
</main>

<div id="notification-panel" class="notification-panel" style="display:none;">
    <div class="notification-header">
        <h3>알림 센터</h3>
        <button class="notif-clear-btn" onclick="clearNotifications()">모두 읽음</button>
    </div>
    <div class="notification-filters">
        <button class="notif-filter active" data-category="all" onclick="filterNotifications('all')">전체</button>
        <button class="notif-filter" data-category="TRADE" onclick="filterNotifications('TRADE')">매매</button>
        <button class="notif-filter" data-category="API" onclick="filterNotifications('API')">API</button>
        <button class="notif-filter" data-category="SYSTEM" onclick="filterNotifications('SYSTEM')">시스템</button>
    </div>
    <div id="notification-list" class="notification-list">
        <div class="notification-empty">알림이 없습니다.</div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<!-- 페이지 전환 로딩 오버레이 -->
<div id="page-loading-overlay" class="page-loading-overlay">
    <div class="page-loading-spinner"></div>
    <span class="page-loading-text">페이지 이동 중...</span>
</div>

<!-- 공통 스크립트 -->
<script src="/static/js/common.js?v=1"></script>
<script src="/static/js/notifications.js?v=1"></script>

{% block scripts %}
<!-- 페이지별 추가 스크립트 -->
{% endblock %}

</body>
</html>
