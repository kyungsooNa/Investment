<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment - Web View</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css?v=9">
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { display: inline-block; animation: spin 1s linear infinite; opacity: 1 !important; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--bg-secondary); color: var(--text-primary); padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 250px; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; animation: toast-in 0.3s ease-out forwards; }
        .toast.success { border-left: 4px solid #51cf66; }
        .toast.error { border-left: 4px solid #ff6b6b; }
        @keyframes toast-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.fade-out { opacity: 0; transform: translateX(100%); transition: all 0.3s ease-in; }
        
        /* 페이지 분리 후 섹션 표시 강제 */
        .section { display: block !important; }

        /* 페이지 전환 로딩 오버레이 */
        .page-loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 12px;
        }
        .page-loading-overlay.active { display: flex; }
        .page-loading-spinner {
            width: 36px; height: 36px;
            border: 3.5px solid rgba(255,255,255,0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .page-loading-text {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
    {% block head_scripts %}
    <!-- 차트 라이브러리는 필요한 페이지에서만 로드 -->
    {% endblock %}
</head>
<body>

<header class="header">
    <h1>Investment</h1>
    <div class="status-bar">
        <span id="status-time">--</span>
        <span id="status-market" class="badge closed">--</span>
        <span id="status-env" class="badge paper clickable" onclick="toggleEnvironment()" title="클릭하여 환경 전환">--</span>
        <button id="ks-badge" class="badge ks-ok" onclick="openKillSwitchModal()" title="Kill Switch 상태 (클릭하여 제어)">
            <span id="ks-badge-text">KS ✓</span>
        </button>
        <div class="notification-wrapper">
            <button class="notification-bell" onclick="toggleNotificationPanel()" title="알림">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span id="notification-badge" class="notification-badge" style="display:none;">0</span>
            </button>
        </div>
    </div>
</header>

<nav class="nav">
    <!-- Flask에서 active_page 변수를 넘겨주어 활성화 클래스 적용 -->
    <a href="/" class="{% if active_page == 'home' %}active{% endif %}">홈</a>
    <a href="/stock" class="{% if active_page == 'stock' %}active{% endif %}">현재가 조회</a>
    <a href="/favorite" class="{% if active_page == 'favorite' %}active{% endif %}">즐겨찾기</a>
    <a href="/balance" class="{% if active_page == 'balance' %}active{% endif %}">계좌 잔고</a>
    <a href="/order" class="{% if active_page == 'order' %}active{% endif %}">매수/매도</a>
    <a href="/overseas" class="{% if active_page == 'overseas' %}active{% endif %}">해외주식</a>
    <a href="/ranking" class="{% if active_page == 'ranking' %}active{% endif %}">랭킹</a>
    <a href="/marketcap" class="{% if active_page == 'marketcap' %}active{% endif %}">시가총액</a>
    <a href="/virtual" class="{% if active_page == 'virtual' %}active{% endif %}">모의투자 기록</a>
    <a href="/scheduler" class="{% if active_page == 'scheduler' %}active{% endif %}">전략 스케줄러</a>
    <a href="/program" class="{% if active_page == 'program' %}active{% endif %}">프로그램매매</a>
    <a href="/system" class="{% if active_page == 'system' %}active{% endif %}">시스템 상태</a>
</nav>

<main class="main" id="page-main">
    {% block content %}
    <!-- 각 페이지의 콘텐츠가 여기에 들어갑니다 -->
    {% endblock %}
    {% block scripts %}
    <!-- 페이지별 추가 스크립트 -->
    {% endblock %}
</main>

<div id="notification-panel" class="notification-panel" style="display:none;">
    <div class="notification-header">
        <h3>알림 센터</h3>
        <button class="notif-clear-btn" onclick="clearNotifications()">모두 읽음</button>
    </div>
    <div class="notification-filters">
        <button class="notif-filter active" data-category="all" onclick="filterNotifications('all')">전체</button>
        <button class="notif-filter" data-category="STRATEGY" onclick="filterNotifications('STRATEGY')">전략</button>
        <button class="notif-filter" data-category="TRADE" onclick="filterNotifications('TRADE')">매매</button>
        <button class="notif-filter" data-category="API" onclick="filterNotifications('API')">API</button>
        <button class="notif-filter" data-category="SYSTEM" onclick="filterNotifications('SYSTEM')">시스템</button>
    </div>
    <div id="notification-list" class="notification-list">
        <div class="notification-empty">알림이 없습니다.</div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<!-- 페이지 전환 로딩 오버레이 -->
<div id="page-loading-overlay" class="page-loading-overlay">
    <div class="page-loading-spinner"></div>
    <span class="page-loading-text">페이지 이동 중...</span>
</div>

<!-- Kill Switch 모달 -->
<div id="ks-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9100;" onclick="closeKillSwitchModal()"></div>
<div id="ks-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#1e1e2e;color:#cdd6f4;border:1px solid #45475a;border-radius:12px;
    padding:24px 28px;z-index:9101;min-width:340px;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,0.6);">
    <h3 style="margin:0 0 16px;font-size:1.1rem;">🛡️ Kill Switch 상태</h3>
    <div id="ks-modal-body" style="font-size:0.88rem;line-height:1.7;"></div>
    <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end;">
        <button id="ks-btn-reset" onclick="resetKillSwitch()"
            style="display:none;padding:8px 18px;background:#a6e3a1;color:#1e1e2e;border:none;border-radius:6px;cursor:pointer;font-weight:600;">
            해제
        </button>
        <button id="ks-btn-trip" onclick="tripKillSwitch()"
            style="padding:8px 18px;background:#f38ba8;color:#1e1e2e;border:none;border-radius:6px;cursor:pointer;font-weight:600;">
            수동 트립
        </button>
        <button onclick="closeKillSwitchModal()"
            style="padding:8px 18px;background:#45475a;color:#cdd6f4;border:none;border-radius:6px;cursor:pointer;">
            닫기
        </button>
    </div>
</div>

<!-- 공통 스크립트 -->
<script src="/static/js/common.js?v=5"></script>
<script src="/static/js/notifications.js?v=1"></script>
<script src="/static/js/kill_switch.js?v=3"></script>
<script src="/static/js/pagination.js?v=1"></script>

<!-- ── 서버 요청 진단 패널 (hang 디버깅용) ─────────────────────────────
     - ?debug=1 또는 localStorage.debugRequests='1' 일 때만 활성화
     - 2초마다 /api/debug/requests 폴링 → in-flight 요청 + FG 상태 표시
     - 2초 이상 걸리는 요청이 생기면 자동으로 패널 열림 + 주황색 경고
     - 콘솔 헬퍼: __debug.requests() / __debug.fg()
─────────────────────────────────────────────────────────────────────── -->
<div id="dbg-panel" style="
    position:fixed; bottom:16px; left:16px; z-index:9000;
    background:#1a1a2e; color:#ccc; border:1px solid #444;
    border-radius:8px; font-size:0.78rem; font-family:monospace;
    box-shadow:0 4px 16px rgba(0,0,0,0.5); min-width:160px; max-width:320px;
    transition:border-color 0.3s;">
    <div id="dbg-header" style="
        padding:5px 10px; cursor:pointer; display:flex;
        justify-content:space-between; align-items:center; gap:12px;
        user-select:none;">
        <span id="dbg-title" style="font-weight:bold;">🔍 요청 0</span>
        <span id="dbg-toggle" style="color:#666; font-size:0.7rem;">▲</span>
    </div>
    <div id="dbg-body" style="display:none; padding:0 10px 8px; border-top:1px solid #333;">
        <div id="dbg-fg" style="margin:5px 0 4px; font-size:0.75rem;"></div>
        <div id="dbg-list" style="max-height:160px; overflow-y:auto;"></div>
        <div style="margin-top:6px; color:#555; font-size:0.72rem; border-top:1px solid #2a2a3a; padding-top:4px;">
            콘솔: <span style="color:#888;">__debug.requests()</span>
        </div>
    </div>
</div>
<script>
(function () {
    const debugEnabled = new URLSearchParams(window.location.search).get('debug') === '1'
        || window.localStorage.getItem('debugRequests') === '1';
    if (!debugEnabled) {
        const panel = document.getElementById('dbg-panel');
        if (panel) panel.remove();
        window.__debug = {
            enable: () => {
                window.localStorage.setItem('debugRequests', '1');
                window.location.reload();
            },
            disable: () => window.localStorage.removeItem('debugRequests'),
        };
        return;
    }

    const panel  = document.getElementById('dbg-panel');
    const header = document.getElementById('dbg-header');
    const title  = document.getElementById('dbg-title');
    const toggle = document.getElementById('dbg-toggle');
    const body   = document.getElementById('dbg-body');
    const fgEl   = document.getElementById('dbg-fg');
    const list   = document.getElementById('dbg-list');

    let expanded = false;

    function setExpanded(v) {
        expanded = v;
        body.style.display = expanded ? 'block' : 'none';
        toggle.textContent = expanded ? '▼' : '▲';
    }
    header.addEventListener('click', () => setExpanded(!expanded));

    // 진단 서버(포트 8001, OS 스레드) 우선 → asyncio 루프가 완전히 블록돼도 응답 가능
    // 실패 시 메인 서버(/api/debug/requests) 폴백
    const DBG_URL  = 'http://127.0.0.1:8001/debug/requests';
    const MAIN_URL = '/api/debug/requests';

    let pollInFlight = false;

    async function poll() {
        if (pollInFlight) return;
        pollInFlight = true;
        try {
            const r = await fetch(DBG_URL, { signal: AbortSignal.timeout(1500) });
            if (r.ok) { render(await r.json()); return; }
        } catch (_) {}
        try {
            const r = await fetch(MAIN_URL, { signal: AbortSignal.timeout(1500) });
            if (r.ok) render(await r.json());
        } catch (_) {}
        finally {
            pollInFlight = false;
        }
    }

    function render(d) {
        const count   = d.count || 0;
        const items   = d.data || [];
        const fg      = d.foreground || {};
        const hasLong = items.some(r => r.elapsed_sec >= 2);

        // 타이틀
        title.textContent = `🔍 요청 ${count}`;
        title.style.color = hasLong ? '#ff9800' : '#ccc';
        panel.style.borderColor = hasLong ? '#ff9800' : '#444';

        // 2초 이상 요청 생기면 자동 열림
        if (hasLong && !expanded) setExpanded(true);

        // ForegroundScheduler 상태
        if (fg.is_blocking_background) {
            fgEl.innerHTML = `<span style="color:#ff9800;">⚠ FG 활성 — BG 중단 중 (${fg.active_count}개)</span>`;
        } else {
            fgEl.innerHTML = `<span style="color:#4caf50;">✓ FG 정상</span>`;
        }

        // 요청 목록
        if (items.length === 0) {
            list.innerHTML = '<div style="color:#555;">처리 중인 요청 없음</div>';
        } else {
            list.innerHTML = items.map(r => {
                const color = r.elapsed_sec >= 3 ? '#ff6b6b'
                            : r.elapsed_sec >= 2 ? '#ff9800'
                            : '#666';
                const qs = r.query ? `?${r.query}` : '';
                return `<div style="color:${color}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin:1px 0;"
                             title="${r.method} ${r.path}${qs}">
                    ${r.elapsed_sec}s ${r.path}${qs}
                </div>`;
            }).join('');
        }
    }

    setInterval(poll, 2000);
    poll();

    // ── 콘솔 헬퍼 ──────────────────────────────────────────────────────────
    // frontend가 완전히 멈췄을 때 F12 콘솔에서 직접 실행
    //
    // __debug.requests()
    //   → 포트 8001 진단 서버에서 in-flight 요청 목록 출력 (asyncio 블록 시에도 동작)
    //
    // __debug.fg()
    //   → 메인 서버에서 ForegroundScheduler + BG 태스크 상태 출력
    //     (asyncio가 살아있을 때만 응답)
    window.__debug = {
        requests: () =>
            fetch('http://127.0.0.1:8001/debug/requests')
                .then(r => r.json())
                .then(d => { console.log('[현재 in-flight]'); console.table(d.data); console.log('[최근 완료 이력]'); console.table(d.recent); return d; })
                .catch(() =>
                    fetch('/api/debug/requests')
                        .then(r => r.json())
                        .then(d => { console.log('[현재 in-flight (main)]'); console.table(d.data); console.log('[최근 완료]'); console.table(d.recent); return d; })
                ),
        fg: () =>
            fetch('/api/background/status')
                .then(r => r.json())
                .then(d => { console.log('[ForegroundScheduler]', d.foreground); console.table(d.data); return d; }),
        disable: () => {
            window.localStorage.removeItem('debugRequests');
            window.location.reload();
        },
    };
})();
</script>

</body>
</html>
