{% extends "base.html" %}

{% block content %}
<div class="section">
    <h2 style="margin-bottom: 20px;">⚙️ 시스템 상태 모니터링</h2>
    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <!-- 캐시 모니터링 대시보드 -->
        <div class="card cache-status-container" style="padding: 20px; flex: 1; min-width: 300px;">
            <h3 style="margin-top: 0; margin-bottom: 16px;">📊 메모리 캐시 상태</h3>
            <p style="font-size: 1.1rem; margin: 8px 0;">요청 횟수: <span id="cache-total" style="font-weight: bold;">0</span></p>
            <p style="font-size: 1.1rem; margin: 8px 0;">적중 횟수(Hit): <span id="cache-hits" style="font-weight: bold; color: var(--primary-color, #2196F3);">0</span></p>
            <p style="font-size: 1.1rem; margin: 8px 0;">실패 횟수(Miss): <span id="cache-misses" style="font-weight: bold; color: var(--danger-color, #f44336);">0</span></p>
            <p style="font-size: 1.1rem; margin: 8px 0;">적중률: <strong id="cache-rate" style="font-size: 1.3rem;">0.00</strong><strong style="font-size: 1.3rem;">%</strong></p>
            <p style="font-size: 1.1rem; margin: 8px 0;">사용 중인 종목 수: <span id="cache-size" style="font-weight: bold;">0</span> / 500</p>
        </div>
    </div>
</div>

<script>
    async function updateCacheStatus() {
        try {
            const response = await fetch('/api/cache/status');
            if (!response.ok) throw new Error('네트워크 응답이 정상이 아닙니다.');
            
            const result = await response.json();
            
            if (result.success && result.data) {
                const stats = result.data;
                document.getElementById('cache-total').textContent = stats.total_requests.toLocaleString();
                document.getElementById('cache-hits').textContent = stats.hits.toLocaleString();
                document.getElementById('cache-misses').textContent = stats.misses.toLocaleString();
                document.getElementById('cache-rate').textContent = stats.hit_rate.toFixed(2);
                document.getElementById('cache-size').textContent = stats.current_size;
                
                const rateElement = document.getElementById('cache-rate');
                rateElement.style.color = stats.hit_rate >= 90 ? 'var(--success-color, #4CAF50)' : 
                                          stats.hit_rate >= 50 ? 'orange' : 'var(--danger-color, #f44336)';
            }
        } catch (error) {
            console.error('캐시 상태를 가져오는 중 오류 발생:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', updateCacheStatus);
    setInterval(updateCacheStatus, 5000);
</script>
{% endblock %}
